{%- comment -%}
  Overrides jekyll-theme-minimal's head injection. The minimal theme ships an
  empty stub at this path; anything we put here is appended inside <head>,
  so the favicon, theme color, and social cards land on every rendered page.
{%- endcomment -%}
<link rel="icon" type="image/png" sizes="256x256" href="{{ '/assets/logo.png' | relative_url }}">
<link rel="apple-touch-icon" href="{{ '/assets/logo.png' | relative_url }}">
<meta name="theme-color" content="#ea580c">

<meta property="og:type" content="website">
<meta property="og:site_name" content="Present-JSON">
<meta property="og:title" content="{{ page.title | default: site.title }}">
<meta property="og:description" content="{{ page.description | default: site.description }}">
<meta property="og:image" content="{{ '/assets/og-image.png' | absolute_url }}">
<meta property="og:url" content="{{ page.url | absolute_url }}">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ page.title | default: site.title }}">
<meta name="twitter:description" content="{{ page.description | default: site.description }}">
<meta name="twitter:image" content="{{ '/assets/og-image.png' | absolute_url }}">
